<!doctype html>
<html lang="it"><head><meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Force update</title>
<style>
  body{margin:0;background:#0B0B12;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    display:flex;justify-content:center;padding:36px}
  .phone{width:390px;height:780px;background:#FDFDFD;border-radius:44px;display:flex;flex-direction:column;
    padding:64px 28px 40px;box-shadow:0 24px 60px rgba(20,20,31,.4)}
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center}
  .logo{width:88px;height:88px;border-radius:22px;background:#1A1A2E;display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 24px rgba(26,26,46,.25)}
  .title{font-size:22px;font-weight:600;color:#1A1A2E;letter-spacing:-.3px;margin:0}
  .body{font-size:15px;font-weight:400;color:#6B7280;line-height:22px;margin:0;max-width:300px}
  .button{background:#1A1A2E;border-radius:14px;padding:16px;text-align:center}
  .button span{font-size:16px;font-weight:600;color:#fff;letter-spacing:-.2px}
</style></head>
<body>
  <div class="phone">
    <div class="center">
      <div class="logo">
        <!-- stand-in for assets/icon.png (navy app icon) -->
        <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="#F5EFE6" stroke-width="1.6"><circle cx="12" cy="12" r="9"/><path d="M15.5 8.5l-7 3 3 1.5 1.5 3 2.5-7.5z" fill="#F5EFE6" stroke="none"/><circle cx="18.5" cy="6" r="1.4" fill="#22D3EE" stroke="none"/></svg>
      </div>
      <h1 class="title">Aggiorna Reglo</h1>
      <p class="body">È disponibile una nuova versione dell'app.<br/>Aggiornala per continuare a usare Reglo.</p>
    </div>
    <div class="button"><span>Aggiorna ora</span></div>
  </div>
</body></html>
